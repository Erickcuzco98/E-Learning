<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Curso E-Learning - Erick Cuzco</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>

        body{
            background: linear-gradient(135deg,#0f172a,#1e293b,#334155);
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }

        /* LOGIN */

        .login-container{
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card-login{
            width: 400px;
            border-radius: 20px;
            border: none;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            box-shadow: 0px 8px 25px rgba(0,0,0,0.4);
            color: white;
        }

        .form-control{
            border-radius: 12px;
        }

        .btn-login{
            background: #0ea5e9;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-login:hover{
            background: #0284c7;
            transform: scale(1.03);
        }

        /* DASHBOARD */

        #dashboard{
            display: none;
            padding: 30px;
        }

        .dashboard-title{
            color: white;
            text-align: center;
            margin-bottom: 40px;
            font-weight: bold;
            line-height: 1.5;
        }

        .lesson-card{
            border-radius: 18px;
            overflow: hidden;
            border: none;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        .lesson-card:hover{
            transform: translateY(-5px);
        }

        .card-header{
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            padding: 15px;
        }

        .card-body{
            background: white;
        }

        .btn-custom{
            width: 100%;
            margin-bottom: 10px;
            border-radius: 10px;
            font-weight: bold;
            padding: 10px;
        }

        .footer{
            text-align: center;
            color: white;
            margin-top: 40px;
            font-size: 15px;
        }

    </style>

</head>

<body>

<!-- LOGIN -->

<div class="container login-container" id="login">

    <div class="card card-login p-4">

        <div class="text-center mb-4">

            <h2>
                <i class="fa-solid fa-user-lock"></i>
                LOGIN
            </h2>

            <p>Lecciones E-Learning</p>

        </div>

        <input
            type="text"
            id="usuario"
            class="form-control mb-3"
            placeholder="Usuario"
        >

        <input
            type="password"
            id="password"
            class="form-control mb-3"
            placeholder="Contraseña"
        >

        <button
            class="btn btn-login text-white w-100 py-2"
            onclick="ingresar()"
        >

            <i class="fa-solid fa-right-to-bracket"></i>
            Ingresar

        </button>

        <p class="text-danger text-center mt-3" id="mensaje"></p>

    </div>

</div>

<!-- DASHBOARD -->

<div id="dashboard" class="container-fluid">

    <h1 class="dashboard-title">

        <i class="fa-solid fa-graduation-cap"></i>

        <br>

        Curso E-Learning - Autor Erick Cuzco

        <br>

        Licenciatura de Enseñanza de la Informática y la Computación

    </h1>

    <div class="row g-4" id="contenedorLecciones"></div>

    <div class="footer">

        © Erick Cuzco - Plataforma Educativa

    </div>

</div>

<script>

    // LOGIN

    function ingresar(){

        let usuario = document.getElementById("usuario").value;
        let password = document.getElementById("password").value;

        if(usuario === "ErickCuzco" && password === "3001"){

            document.getElementById("login").style.display = "none";
            document.getElementById("dashboard").style.display = "block";

        }else{

            document.getElementById("mensaje").innerHTML =
            "Usuario o contraseña incorrectos";

        }

    }

    // VIDEOS

    const videos = [

        "https://youtu.be/si4lJY2DouI",
        "https://youtu.be/pvzgwhxXfj0",
        "https://youtu.be/PyZtJez5TUI",
        "https://youtu.be/sva_VNCqLFg",
        "https://youtu.be/AOyp4qAgFVg",
        "https://youtu.be/j8rv2tGvti4",
        "https://youtu.be/NcwqJYVVa6E",
        "https://youtu.be/GiIVYKOVSZY",
        "https://youtu.be/yMjr-8eWAQw",
        "https://youtu.be/GT46w2xzHqY"

    ];

    // CONTENEDOR

    const contenedor = document.getElementById("contenedorLecciones");

    // CREAR LECCIONES

    for(let i = 1; i <= 10; i++){

        contenedor.innerHTML += `

        <div class="col-md-6 col-lg-4">

            <div class="card lesson-card">

                <div class="card-header bg-primary text-white">

                    LECCIÓN ${i}

                </div>

                <div class="card-body">

                    <!-- VIDEO -->

                    <a
                        href="${videos[i-1]}"
                        target="_blank"
                        class="btn btn-danger btn-custom"
                    >

                        <i class="fa-brands fa-youtube"></i>

                        Ver Video

                    </a>

                    <!-- PDF -->

                    <a
                        href="leccion${i}.pdf"
                        target="_blank"
                        class="btn btn-success btn-custom"
                    >

                        <i class="fa-solid fa-file-pdf"></i>

                        Ver PDF

                    </a>

                    <!-- IMAGEN -->

                    <a
                        href="imagen_ejercicio${i}.png"
                        target="_blank"
                        class="btn btn-warning btn-custom"
                    >

                        <i class="fa-solid fa-image"></i>

                        Ver Imagen

                    </a>

                </div>

            </div>

        </div>

        `;

    }

</script>

</body>

</html>
